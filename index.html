<h1>Welcome</h1><!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KMJ Pages</title>

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, sans-serif;
        }

        body {
            min-height: 100vh;
            background: #0d1117;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            width: 90%;
            max-width: 600px;
        }

        h1 {
            margin-bottom: 30px;
            font-size: 42px;
        }

        .links {
            display: grid;
            gap: 15px;
        }

        a {
            text-decoration: none;
            background: #161b22;
            color: white;
            padding: 18px 25px;
            border-radius: 12px;
            border: 1px solid #30363d;
            transition: .3s;
            font-size: 18px;
        }

        a:hover {
            background: #238636;
            transform: translateY(-3px);
        }

        span {
            opacity: .5;
            font-size: 14px;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>KMJ Pages</h1>

    <div class="links">

        <a href="/eng">
            Engineering
            <br>
            <span>/eng</span>
        </a>

        <a href="/law">
            Law
            <br>
            <span>/law</span>
        </a>


        <a href="/non-engg">
            Non Engineering
            <br>
            <span>/non-engg</span>
        </a>


        <a href="/non-engg/pharmacy">
            Pharmacy
            <br>
            <span>/non-engg/pharmacy</span>
        </a>


        <a href="/pg">
            PG
            <br>
            <span>/pg</span>
        </a>


        <a href="/sanal">
            Sanal
            <br>
            <span>/sanal</span>
        </a>


    </div>

</div>

</body>
</html>
